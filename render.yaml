services:
  - type: web
      name: rs-rsi-bot
          runtime: python
              buildCommand: pip install -r requirements.txt
                  startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
                      envVars:
                            - key: TELEGRAM_BOT_TOKEN
                                    sync: false
                                          - key: TELEGRAM_CHAT_ID
                                                  sync: false
                                                        - key: RENDER_URL
                                                                sync: false
                                                                      - key: UNIVERSE
                                                                              value: BOTH
                                                                                    - key: CAPITAL_N200
                                                                                            value: "50000"
                                                                                                  - key: CAPITAL_N500
                                                                                                          value: "50000"
                                                                                                                - key: RS_PERIOD
                                                                                                                        value: "70"
                                                                                                                              - key: RSI_LENGTH
                                                                                                                                      value: "5"
                                                                                                                                            - key: RSI_THRESHOLD
                                                                                                                                                    value: "40"
                                                                                                                                                          - key: SMA_LENGTH
                                                                                                                                                                  value: "15"
                                                                                                                                                                        - key: TOP_N
                                                                                                                                                                                value: "5"
                                                                                                                                                                                      - key: SMA_ENTRY_FILTER
                                                                                                                                                                                              value: "true"
                                                                                                                                                                                                    - key: REBAL_DAYS
                                                                                                                                                                                                            value: "5"
                                                                                                                                                                                                            
